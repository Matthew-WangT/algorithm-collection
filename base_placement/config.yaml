# 双臂 Rizon4 base 布局优化 — 全部可调参数
robot:
  urdf_path: /Users/matthew/mindon/mindon_robotics/assets/resource/robot/s1/urdf/serial_s1_with_gripper.urdf
  # 注意：部署到实机前应换成 flexiv_rdk Model::SyncURDF() 导出的标定 URDF
  # 帧名 / 关节前缀模板（{side} 会替换成 left/right）。换机器人只改这里，代码不动。
  # rizon4 用 "{side}_base_link" / "{side}_gripper_f90c_end_effector_link" / "{side}_joint"
  base_frame: astribot_arm_{side}_base_link
  ee_frame: "{side}_gripper_f90c_end_effector_link"
  joint_prefix: astribot_arm_{side}_joint

map:
  voxel_size: 0.05
  n_dirs: 32          # Fibonacci 球面接近方向数
  n_rolls: 8          # 绕接近轴 roll 档数
  n_fk_samples: 1_000_000_000
  n_workers: 28
  dir: out_base_placement/maps

task:  # 合成任务点（真实 UMI 轨迹到位后换 loader）
  z_table: 0.75
  x_range: [0.7417, 1.3514]
  y_left: [-0.3297, 0.4832]
  y_right: [-0.7366, 0.1023]
  y_shared: [-0.15, 0.15] # 统计重叠指标时用哪块区域采样
  z_above: [0.0718, 0.9137]
  n_per_arm: 150
  n_shared: 100
  seed: 42

layout:
  x_base: 0.0
  z_base: 1.4
  pitch: 1.57          # 水平朝前安装（与现有 URDF 一致），theta = 向内 roll
  d_range: [0.2, 1.2]
  theta_range: [0.0, 1.0]
  grid_d: 13
  grid_theta: 13

region_search:  # 新模式：布局 (d,θ) 固定，搜索操作区 AABB 最佳中心 p=(px,pz)，py 恒为 0
  d_fixed: 0.60            # 固定布局：两臂间距
  theta_fixed: 0.50        # 固定布局：向内 roll
  aabb_size: [0.5, 0.9]    # 操作区 AABB 的 x/y 尺寸 (m)；z 向高度带复用 task.z_above
  split_ratio: [0.4, 0.4]  # (arm_frac, shared_frac)：沿 y 向三分区比例
  px_range: [-0.2, 0.6]
  pz_range: [0.0, 0.0]     # 相对 z_table 桌面基准的偏移；单值区间 => 退化为 1D x 搜索
  grid_px: 15
  grid_pz: 1               # pz_range 为单值时设 1
  top_k: 5                 # 精评候选数
  # 任务点数量 (n_per_arm/n_shared)、z_table、z_above、seed 复用上面的 task 段

scoring:
  alpha_manip: 1.0
  beta_table: 0.0
  d_ref_table: 0.05     # 超过这个参考值就不再加分
  lambda_self: 2.0      # 双臂碰撞率越高扣分越狠
  lambda_overlap: 2.0   # overlap 考虑是否仅输出分项，还是进总分
  d_self_safe: 0.05
  w_overlap_min: 0.2 # 质量门槛

refine:
  top_k: 8
  n_seed: 10
  tol_pos: 1.0e-3
  tol_rot: 1.0e-2
  max_iter: 100
  kappa_max: 50.0       # 最高条件数，计算占比
  n_workers: 28

output:
  dir: out_base_placement
